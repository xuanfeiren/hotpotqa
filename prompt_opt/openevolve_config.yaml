# OpenEvolve configuration for HotpotQA prompt optimization
# Mirrors the settings from openevolve/examples/llm_prompt_optimization/config.yaml
# but adapted for our project structure.

# General settings
max_iterations: 20
checkpoint_interval: 5
log_level: "INFO"
diff_based_evolution: false   # Full rewrite mode (best for prompt optimization)
max_code_length: 10000
language: "text"              # Prompt evolution, not code

# LLM Configuration
# llm:
#   api_base: "https://generativelanguage.googleapis.com/v1beta/openai/"
#   api_key: "${GEMINI_API_KEY}"
#   models:
#     - name: "gemini-2.5-flash-lite"
#       weight: 1.0
#
#   temperature: 0.4
#   max_tokens: 16000
#   timeout: 150
#   retries: 3

llm:
  api_base: "http://127.0.0.1:8000/v1"
  api_key: "EMPTY"
  models:
    - name: "openai/gpt-oss-20b"
      weight: 1.0

  temperature: 0.4
  max_tokens: 16000
  timeout: 150
  retries: 3


# Prompt Configuration
prompt:
  num_top_programs: 3
  num_diverse_programs: 2
  include_artifacts: true

  # System message for prompt evolution
  system_message: |
    You are an expert in agent prompt optimization for HotpotQA (multi-hop reasoning). Questions require reasoning over information spread across multiple context paragraphs.

    The meta-instructions you are improving will be combined with a fixed data template:
    Context:
    {context}

    Question: {question}

    Answer:

    Goal: Create instructions that generalize across all tasks based on local feedback from specific question-answer pairs.

# Database Configuration
database:
  population_size: 500
  archive_size: 50
  num_islands: 3

  feature_dimensions: ["length"]
  feature_bins: 10

  elite_selection_ratio: 0.1
  exploration_ratio: 0.3
  exploitation_ratio: 0.6

  migration_interval: 5
  migration_rate: 0.1

# Evaluator Configuration
evaluator:
  timeout: 600              # 10 min per evaluation
  max_retries: 2
  parallel_evaluations: 10  # Match the default TaskPool concurrency of 10
  cascade_evaluation: true  # Two-stage cascading evaluation
  cascade_thresholds: [0.5] # Stage 1 must achieve >= 50% to proceed to stage 2

# Global Evolution Settings
num_workers: 1              # Ensure single evolutionary branch (serial search)
num_islands: 1              # Simplify to 1 island
max_iterations: 50
checkpoint_interval: 1      # Save best/calls every iteration as requested
log_level: "INFO"
diff_based_evolution: false
max_code_length: 10000
language: "text"
